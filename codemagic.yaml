workflows:
  paz_castanhal_temp:
    name: PazCastanhalTemp
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Instalar dependências
        script: |
          flutter pub get
      # - name: Rodar testes
      #   script: |
      #     flutter test
      - name: Build iOS
        script: |
          # Garante que as dependências estejam instaladas antes do build
          flutter pub get
          flutter build ios --release --no-codesign
      - name: Build Android
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/ios/iphoneos/Runner.app
    publishing:
      email:
        recipients:
          - your-email@example.com
